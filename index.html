<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>产品列表页</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="index.html">Nova 产品展示</a>
      </div>
    </header>

    <main class="container page-main">
      <section class="hero">
        <h1>产品列表页</h1>
        <p>
          这里共有 <span id="productCount">3</span> 款产品，点击卡片按钮可进入详情页。
        </p>
      </section>

      <section class="product-grid">
        <article class="product-card">
          <p class="card-tag">产品 01</p>
          <h2>Starter</h2>
          <p>适合个人用户，帮助你快速启动和验证创意。</p>
          <a class="btn" href="product1.html">查看详情</a>
        </article>

        <article class="product-card">
          <p class="card-tag">产品 02</p>
          <h2>Pro</h2>
          <p>面向进阶需求，提供更高效率与稳定体验。</p>
          <a class="btn" href="product2.html">查看详情</a>
        </article>

        <article class="product-card">
          <p class="card-tag">产品 03</p>
          <h2>Enterprise</h2>
          <p>适用于团队协作场景，具备更强的扩展能力。</p>
          <a class="btn" href="product3.html">查看详情</a>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
